# ------------------------------------------------------------
# SonarCloud Project Configuration
# ------------------------------------------------------------
sonar.projectKey=stephenlclarke_pacman
sonar.projectName=pacman
sonar.organization=stephenlclarke
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# ------------------------------------------------------------
# Source and Language Configuration
# ------------------------------------------------------------
sonar.sources=src,examples
sonar.tests=src
